version: "3.9"

services:

  db:

    image: postgres:16

    container_name: netra-db

    restart: always

    environment:

      POSTGRES_USER: netra

      POSTGRES_PASSWORD: netra123

      POSTGRES_DB: netra

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  backend:

    build:

      context: ./backend

    container_name: netra-backend

    ports:

      - "8000:8000"

    env_file:

      - ./backend/.env

    depends_on:

      - db

    volumes:

      - ./backend:/app

volumes:

  postgres_data:
